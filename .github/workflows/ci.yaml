name: CI - nsfwcheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME: nsfwcheck
  IMAGE_DIR: .

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Only run if Docker Hub secrets are available
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract project version
        id: version
        run: |
          VERSION=$(grep -m 1 "version =" pyproject.toml | cut -d '"' -f 2)
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Lowercase owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.IMAGE_DIR }}
          push: true
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY_GHCR }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ env.PROJECT_VERSION }}
            ${{ env.REGISTRY_GHCR }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and Push Helm Chart
        run: |
          CHART_VERSION="${{ env.PROJECT_VERSION }}-${{ github.run_number }}"
          helm package k8s/${{ env.IMAGE_NAME }} --version $CHART_VERSION --app-version ${{ env.PROJECT_VERSION }}
          helm push ${{ env.IMAGE_NAME }}-$CHART_VERSION.tgz oci://${{ env.REGISTRY_GHCR }}/${{ env.OWNER_LC }}/charts
