apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagesafe
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: imagesafe
spec:
  replicas: {{ .Values.imagesafe.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: imagesafe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: imagesafe
    spec:
      containers:
        - name: imagesafe
          image: "{{ .Values.imagesafe.image.repository }}:{{ .Values.imagesafe.image.tag }}"
          imagePullPolicy: {{ .Values.imagesafe.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.imagesafe.resources | nindent 12 }}
